services:
  postgres:
    image: postgres:16
    container_name: bd_flink_postgres
    environment:
      POSTGRES_DB: lab3
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d lab3"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:3.7.0
    container_name: bd_flink_kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9094:9092"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 30

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: bd_flink_kafka_init
    command:
      - /bin/bash
      - -lc
      - /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic pet-sales --partitions 1 --replication-factor 1
    depends_on:
      kafka:
        condition: service_healthy

  jobmanager:
    build: ./flink-job
    image: bd-flink-job:latest
    container_name: bd_flink_jobmanager
    command: standalone-job --job-classname ru.lab.PetSalesFlinkJob
    environment:
      JOB_MANAGER_RPC_ADDRESS: jobmanager
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: pet-sales
      POSTGRES_URL: jdbc:postgresql://postgres:5432/lab3
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  taskmanager:
    image: bd-flink-job:latest
    container_name: bd_flink_taskmanager
    command: taskmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: jobmanager
      TASK_MANAGER_NUMBER_OF_TASK_SLOTS: 2
    depends_on:
      - jobmanager

  producer:
    build: ./producer
    container_name: bd_flink_producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: pet-sales
      SOURCE_DIR: /data
    volumes:
      - ./исходные данные:/data:ro
    depends_on:
      kafka-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  kafka_data:
